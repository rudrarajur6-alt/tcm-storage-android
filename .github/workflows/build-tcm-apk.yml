name: Build TCM Storage APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Grant Gradle wrapper permissions
        run: chmod +x gradlew
      - name: Configure Gradle memory
        run: |
          echo "org.gradle.jvmargs=-Xmx6g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:MaxMetaspaceSize=1g" >> gradle.properties
          echo "org.gradle.workers.max=2" >> gradle.properties
      - name: Build generic debug APK
        run: ./gradlew assembleGenericDebug --stacktrace
      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/generic/debug/*.apk out/tcm-storage-debug.apk
          ls -la out/
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tcm-storage-debug-apk
          path: out/tcm-storage-debug.apk
          retention-days: 30
      - name: Publish release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-${{ github.run_number }}
          name: TCM Storage debug build ${{ github.run_number }}
          files: out/tcm-storage-debug.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
